<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      margin: 0;
    }
    h1 { font-size: 16px; margin: 0 0 12px; color: #a78bfa; }
    label { display: block; font-size: 12px; color: #888; margin: 8px 0 4px; }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 8px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #2a2a3e;
      color: #e0e0e0;
      font-size: 13px;
      box-sizing: border-box;
    }
    input:focus { outline: none; border-color: #a78bfa; }
    .toggle { display: flex; align-items: center; gap: 8px; margin: 12px 0; }
    .toggle input { width: auto; }
    .status { font-size: 11px; color: #666; margin-top: 12px; }
    .status.ok { color: #4ade80; }
    .status.err { color: #f87171; }
    button {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 6px;
      background: #a78bfa;
      color: white;
      font-size: 13px;
      cursor: pointer;
      margin-top: 12px;
    }
    button:hover { background: #8b5cf6; }
    .footer { font-size: 10px; color: #555; margin-top: 12px; text-align: center; }
    .footer a { color: #a78bfa; text-decoration: none; }
  </style>
</head>
<body>
  <h1>🎭 AI-MIME Settings</h1>

  <div class="toggle">
    <input type="checkbox" id="enabled" checked>
    <label for="enabled" style="margin:0; color:#e0e0e0">Enabled</label>
  </div>

  <label>OpenRouter API Key</label>
  <input type="password" id="openrouterKey" placeholder="sk-or-...">

  <label>KLIPY API Key (optional — has default)</label>
  <input type="password" id="klipyKey" placeholder="Leave empty for default">

  <button id="save">Save</button>

  <div id="status" class="status"></div>

  <div class="footer">
    <a href="https://openrouter.ai/keys" target="_blank">Get OpenRouter key</a> ·
    <a href="https://github.com/Deefunxion/ai-mime" target="_blank">GitHub</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
