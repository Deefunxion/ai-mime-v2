<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      width: 350px;
      background: #131313;
      color: #ccc;
      font-family: 'Be Vietnam Pro', -apple-system, sans-serif;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 16px 12px;
      border-bottom: 1px solid #2a2a2a;
    }
    .header img { width: 26px; height: 26px; opacity: 0.9; }
    .header .title {
      font-size: 16px;
      font-weight: 800;
      color: #e8e8e8;
      letter-spacing: -0.3px;
    }
    .header .ver {
      margin-left: auto;
      font-size: 10px;
      color: #444;
      font-weight: 500;
    }

    /* Mute bar */
    .mute-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
    }
    .mute-bar .m-label { font-size: 13px; font-weight: 700; color: #d0d0d0; }
    .mute-bar .m-sub { font-size: 10px; color: #666; margin-top: 1px; }
    .mute-toggle {
      position: relative;
      width: 44px;
      height: 24px;
      cursor: pointer;
    }
    .mute-toggle input { opacity: 0; width: 0; height: 0; }
    .mute-slider {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 12px;
      transition: background 0.2s;
    }
    .mute-slider::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      background: #666;
      border-radius: 50%;
      transition: all 0.2s;
    }
    .mute-toggle input:checked + .mute-slider {
      background: #444;
    }
    .mute-toggle input:checked + .mute-slider::before {
      transform: translateX(20px);
      background: #e0e0e0;
    }

    /* Info row */
    .info-row {
      display: flex;
      border-bottom: 1px solid #2a2a2a;
    }
    .info-block {
      flex: 1;
      padding: 12px 16px;
      font-size: 10px;
      color: #666;
    }
    .info-block:first-child { border-right: 1px solid #2a2a2a; }
    .info-block .num {
      font-size: 20px;
      font-weight: 800;
      color: #ccc;
      line-height: 1.1;
    }
    .info-block .num span { color: #e8e8e8; }
    .st-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #888;
      margin: 4px 0;
    }
    .st-d {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #555;
      flex-shrink: 0;
    }
    .st-d.ok { background: #5a9a5a; }
    .st-d.err { background: #9a5a5a; }
    .st-d.checking { background: #8a8a3a; animation: pulse 1s infinite; }
    @keyframes pulse { 50% { opacity: 0.4; } }

    /* Sections */
    .sec {
      padding: 14px 16px;
      border-bottom: 1px solid #2a2a2a;
    }
    .sec:last-of-type { border-bottom: none; }
    .sec-title {
      font-size: 10px;
      font-weight: 700;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 8px;
    }

    /* Inputs */
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #777;
      margin: 10px 0 4px;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 9px 10px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      color: #ccc;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      box-sizing: border-box;
    }
    input[type="text"]:focus, input[type="password"]:focus {
      outline: none;
      border-color: #888;
    }
    input::placeholder { color: #333; }

    /* Size selector */
    .size-row { display: flex; gap: 4px; margin: 6px 0; }
    .size-opt {
      flex: 1;
      text-align: center;
      padding: 8px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      color: #555;
      cursor: pointer;
      transition: all 0.15s;
    }
    .size-opt.active {
      background: #2a2a2a;
      color: #e8e8e8;
      border-color: #444;
    }

    /* Slider */
    .slider-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 8px 0;
    }
    input[type="range"] {
      flex: 1;
      accent-color: #999;
    }
    .s-val {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      color: #aaa;
      min-width: 28px;
      text-align: right;
    }

    /* Save button */
    .save-btn {
      display: block;
      width: 100%;
      padding: 12px;
      background: #2a2a2a;
      border: none;
      color: #ddd;
      font-family: 'Be Vietnam Pro', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      border-top: 1px solid #2a2a2a;
      transition: all 0.15s;
    }
    .save-btn:hover { background: #3a3a3a; color: #fff; }

    .save-status {
      font-size: 11px;
      color: #666;
      margin-top: 4px;
      text-align: center;
      padding: 0 16px;
    }
    .save-status.ok { color: #5a9a5a; }

    /* Footer */
    .foot {
      padding: 10px 16px;
      border-top: 1px solid #2a2a2a;
      text-align: center;
      font-size: 10px;
    }
    .foot a { color: #555; text-decoration: none; }
    .foot a:hover { color: #ccc; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icon32.png" alt="AI-MIME">
    <span class="title">AI-MIME</span>
    <span class="ver">v2.0</span>
  </div>

  <div class="mute-bar">
    <div>
      <div class="m-label">GIF Reactions</div>
      <div class="m-sub" id="muteState">Active</div>
    </div>
    <label class="mute-toggle">
      <input type="checkbox" id="enabled" checked>
      <span class="mute-slider"></span>
    </label>
  </div>

  <div class="info-row">
    <div class="info-block">
      <div class="num"><span id="countUsed">&ndash;</span>/<span id="countLimit">15</span></div>
      reactions today
    </div>
    <div class="info-block">
      <div class="st-item"><span class="st-d checking" id="dotOpenrouter"></span> <span id="statusOpenrouter">checking...</span></div>
      <div class="st-item"><span class="st-d checking" id="dotKlipy"></span> <span id="statusKlipy">checking...</span></div>
    </div>
  </div>

  <div class="sec">
    <div class="sec-title">API Keys</div>
    <label>OpenRouter</label>
    <input type="password" id="openrouterKey" placeholder="sk-or-...">
    <label>KLIPY (optional)</label>
    <input type="password" id="klipyKey" placeholder="leave empty for default">
  </div>

  <div class="sec">
    <div class="sec-title">Overlay</div>
    <label>Size</label>
    <div class="size-row">
      <div class="size-opt" data-size="small">S</div>
      <div class="size-opt active" data-size="medium">M</div>
      <div class="size-opt" data-size="large">L</div>
    </div>
    <label>Reaction Delay</label>
    <div class="slider-wrap">
      <input type="range" id="reactionDelay" min="0" max="2" step="0.5" value="0">
      <span class="s-val" id="delayVal">0s</span>
    </div>
  </div>

  <button class="save-btn" id="save">Save Settings</button>
  <div class="save-status" id="saveStatus"></div>

  <div class="foot">
    <a href="https://openrouter.ai/keys" target="_blank">Get OpenRouter key</a> ·
    <a href="https://github.com/Deefunxion/ai-mime-v2" target="_blank">GitHub</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
